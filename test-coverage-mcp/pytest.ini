[pytest]
# Pytest configuration for test-coverage-mcp

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 7.0

# Test paths
testpaths = test

# Markers
markers =
    asyncio: marks tests as async (requires pytest-asyncio plugin)

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=src/test_coverage_mcp
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-branch

# Coverage options
[coverage:run]
source = src/test_coverage_mcp
branch = True
parallel = True
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */site-packages/*
    */venv/*
    */.venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
skip_empty = True
sort = Cover
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod
    pass
    except ImportError:
    except ModuleNotFoundError:
    @overload
    @typing.overload

[coverage:html]
directory = htmlcov
title = Test Coverage Report - test-coverage-mcp

[coverage:xml]
output = coverage.xml
