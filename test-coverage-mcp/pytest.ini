[pytest]
# Pytest configuration for test-coverage-mcp

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 7.0

# Test paths
testpaths = test

# Markers
markers =
    asyncio: marks tests as async (requires pytest-asyncio plugin)

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=src/test_coverage_mcp
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-branch
