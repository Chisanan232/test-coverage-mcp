# Enhanced Release Configuration
# This file controls release behavior and all project-specific settings
# If this file doesn't exist, defaults will be used

# === RELEASE CONTROL ===
release: true
level: patch  # auto | patch | minor | major

# === RELEASE ARTIFACTS ===
artifacts:
  python: auto  # auto | force | skip
  docker: auto  # auto | force | skip
  # Documentation versioning (supports both legacy and enhanced formats)
  docs:
    # Enhanced multi-section configuration
    mode: auto          # auto | force | skip - How to handle docs versioning
    sections:           # Array of Docusaurus plugin IDs to version
      - docs            # Main documentation section
      - dev             # Development/contributor documentation  
#      - api             # API reference documentation
    strategy: always   # changed | always - When to version sections
    
  # Legacy format (still supported for backward compatibility):
  # docs: auto    # auto | force | skip

notes: "Automatic release based on semantic versioning and enhanced release with multi-section docs versioning"

# === MONOREPO PACKAGE CONFIGURATION ===
packages:
  - name: core
    package_name: test-coverage-mcp
    working_directory: ./test-coverage-mcp
    base_branch: master
    tag_prefix: core/
    python:
      auth_method: token
    docker:
      registries:
        dockerhub: docker.io/chisanan232/test-coverage-mcp
        ghcr: ghcr.io/chisanan232/test-coverage-mcp
      health_check:
        port: 8000
        path: "/health"
      run_options: "-e API_TOKEN=test_token -e DEBUG=true"
  
  - name: codecov
    package_name: test-coverage-mcp-codecov
    working_directory: ./test-coverage-mcp-codecov
    base_branch: master
    tag_prefix: codecov/
    python:
      auth_method: token
    # No docker or docs for codecov plugin (uses core's infrastructure)

# === DEFAULTS (applied to all packages unless overridden) ===
defaults:
  git:
    commit:
      name: "GitHub Actions Bot"
      email: "actions@github.com"
  
  python:
    auth_method: token
  
  validation:
    version: "1.0.0-validation"
    test_version: "validation-test"
  
  docs:
    paths:
      ci_cd: "docs/CI_CD.md"
      installation: "docs/INSTALLATION.md"
      readme: "README.md"
    preview:
      branch: "docs-preview"

