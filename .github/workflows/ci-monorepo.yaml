name: CI - Monorepo
#
# Unified CI workflow for monorepo using a single reusable workflow for test + coverage
# This ensures clean handling when packages have no tests
#
on:
  pull_request:
    branches:
      - master
    paths:
      # Workspace-level changes
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/**"

      # Package changes
      - "test-coverage-mcp/**"
      - "test-coverage-mcp-codecov/**"

      # Configuration changes
      - "mypy.ini"
      - "ruff.toml"
      - "sonar-project.properties"

permissions:
  contents: read
  packages: read
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which packages changed
  detect-changes:
    name: Detect Changed Packages
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      codecov: ${{ steps.filter.outputs.codecov }}
      packages: ${{ steps.set-matrix.outputs.packages }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'test-coverage-mcp/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/**'
              - 'mypy.ini'
              - 'ruff.toml'
            codecov:
              - 'test-coverage-mcp-codecov/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/**'
              - 'mypy.ini'
              - 'ruff.toml'

      - name: Set package matrix
        id: set-matrix
        run: |
          PACKAGES=""
          if [ "${{ steps.filter.outputs.core }}" == "true" ]; then
            if [ -z "$PACKAGES" ]; then
              PACKAGES='["core"]'
            else
              PACKAGES=$(echo "$PACKAGES" | sed 's/\]$/,"core"]/')
            fi
          fi
          if [ "${{ steps.filter.outputs.codecov }}" == "true" ]; then
            if [ -z "$PACKAGES" ]; then
              PACKAGES='["codecov"]'
            else
              PACKAGES=$(echo "$PACKAGES" | sed 's/\]$/,"codecov"]/')
            fi
          fi
          if [ -z "$PACKAGES" ]; then
            PACKAGES='[]'
          fi
          echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
          echo "Packages to test: $PACKAGES"

  # ── Unified test and coverage workflow ──

  test-unit:
    name: Test Unit - ${{ matrix.package }}
    needs: detect-changes
    if: needs.detect-changes.outputs.packages != '[]'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.packages) }}
    uses: ./.github/workflows/rw_test_and_coverage.yaml
    with:
      package: ${{ matrix.package }}
      project_name: ${{ matrix.package == 'core' && 'test-coverage-mcp' || 'test-coverage-mcp-codecov' }}
      test_working_directory: ${{ matrix.package == 'core' && './test-coverage-mcp' || './test-coverage-mcp-codecov' }}
      test_type: unit-test
      test_folder: ./test/unit_test
      python_versions: '["3.12", "3.13", "3.14"]'
      operating_systems: '["ubuntu-latest", "macos-latest"]'
    secrets:
      codecov_token: ${{ secrets.CODECOV_TOKEN }}
      sonar_token: ${{ secrets.SONAR_TOKEN }}

  test-integration:
    name: Test Integration - ${{ matrix.package }}
    needs: detect-changes
    if: needs.detect-changes.outputs.packages != '[]'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.packages) }}
    uses: ./.github/workflows/rw_test_and_coverage.yaml
    with:
      package: ${{ matrix.package }}
      project_name: ${{ matrix.package == 'core' && 'test-coverage-mcp' || 'test-coverage-mcp-codecov' }}
      test_working_directory: ${{ matrix.package == 'core' && './test-coverage-mcp' || './test-coverage-mcp-codecov' }}
      test_type: integration-test
      test_folder: ./test/integration_test
      python_versions: '["3.12", "3.13", "3.14"]'
      operating_systems: '["ubuntu-latest", "macos-latest"]'
    secrets:
      codecov_token: ${{ secrets.CODECOV_TOKEN }}
      sonar_token: ${{ secrets.SONAR_TOKEN }}

  # Summary job
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - test-unit
      - test-integration
    if: always()
    steps:
      - name: Check CI Status
        run: |
          echo "=== Monorepo CI Summary ==="
          echo ""
          echo "Changed Packages:              ${{ needs.detect-changes.outputs.packages }}"
          echo "Core Changed:                  ${{ needs.detect-changes.outputs.core }}"
          echo "Codecov Changed:               ${{ needs.detect-changes.outputs.codecov }}"
          echo ""
          echo "Unit Tests:                    ${{ needs.test-unit.result }}"
          echo "Integration Tests:             ${{ needs.test-integration.result }}"
          echo ""

          if ([ "${{ needs.test-unit.result }}" == "success" ] || [ "${{ needs.test-unit.result }}" == "skipped" ]) && \
             ([ "${{ needs.test-integration.result }}" == "success" ] || [ "${{ needs.test-integration.result }}" == "skipped" ]); then
            echo "✅ CI passed successfully!"
          else
            echo "❌ CI failed. Check test results above."
            exit 1
          fi
