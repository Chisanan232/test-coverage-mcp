name: CI - Monorepo

on:
  pull_request:
    branches:
      - master
    paths:
      # Workspace-level changes
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/**"

      # Package changes
      - "test-coverage-mcp/**"
      - "test-coverage-mcp-codecov/**"

      # Configuration changes
      - "mypy.ini"
      - "ruff.toml"
      - "sonar-project.properties"

permissions:
  contents: read
  packages: read
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which packages changed
  detect-changes:
    name: Detect Changed Packages
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      codecov: ${{ steps.filter.outputs.codecov }}
      packages: ${{ steps.set-matrix.outputs.packages }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'test-coverage-mcp/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/**'
              - 'mypy.ini'
              - 'ruff.toml'
            codecov:
              - 'test-coverage-mcp-codecov/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/**'
              - 'mypy.ini'
              - 'ruff.toml'

      - name: Set package matrix
        id: set-matrix
        run: |
          PACKAGES="[]"
          if [ "${{ steps.filter.outputs.core }}" == "true" ]; then
            PACKAGES=$(echo $PACKAGES | jq '. + ["core"]')
          fi
          if [ "${{ steps.filter.outputs.codecov }}" == "true" ]; then
            PACKAGES=$(echo $PACKAGES | jq '. + ["codecov"]')
          fi
          echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
          echo "Packages to test: $PACKAGES"

  # ── Run tests (one job per test type, each calls the reusable workflow at job level) ──

  run-unit-tests:
    name: Run Unit Tests - ${{ matrix.package }}
    needs: detect-changes
    if: needs.detect-changes.outputs.packages != '[]'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.packages) }}
    uses: Chisanan232/GitHub-Action_Reusable_Workflows-Python/.github/workflows/rw_uv_run_test.yaml@master
    with:
      project_name: ${{ matrix.package == 'core' && 'test-coverage-mcp' || 'test-coverage-mcp-codecov' }}
      working_directory: ${{ matrix.package == 'core' && './test-coverage-mcp' || './test-coverage-mcp-codecov' }}
      test_type: unit-test
      test_folder: ./test/unit_test
      python-versions: '["3.12", "3.13", "3.14"]'
      operating-systems: '["ubuntu-latest", "macos-latest"]'

  run-integration-tests:
    name: Run Integration Tests - ${{ matrix.package }}
    needs: detect-changes
    if: needs.detect-changes.outputs.packages != '[]'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.packages) }}
    uses: Chisanan232/GitHub-Action_Reusable_Workflows-Python/.github/workflows/rw_uv_run_test.yaml@master
    with:
      project_name: ${{ matrix.package == 'core' && 'test-coverage-mcp' || 'test-coverage-mcp-codecov' }}
      working_directory: ${{ matrix.package == 'core' && './test-coverage-mcp' || './test-coverage-mcp-codecov' }}
      test_type: integration-test
      test_folder: ./test/integration_test
      python-versions: '["3.12", "3.13", "3.14"]'
      operating-systems: '["ubuntu-latest", "macos-latest"]'

  run-contract-tests:
    name: Run Contract Tests - ${{ matrix.package }}
    needs: detect-changes
    if: needs.detect-changes.outputs.packages != '[]'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.packages) }}
    uses: Chisanan232/GitHub-Action_Reusable_Workflows-Python/.github/workflows/rw_uv_run_test.yaml@master
    with:
      project_name: ${{ matrix.package == 'core' && 'test-coverage-mcp' || 'test-coverage-mcp-codecov' }}
      working_directory: ${{ matrix.package == 'core' && './test-coverage-mcp' || './test-coverage-mcp-codecov' }}
      test_type: contract-test
      test_folder: ./test/contract_test
      python-versions: '["3.12", "3.13", "3.14"]'
      operating-systems: '["ubuntu-latest", "macos-latest"]'

  # ── Organize coverage reports (one job per test type) ──

  organize-unit-coverage:
    name: Organize Unit Coverage - ${{ matrix.package }}
    needs: [detect-changes, run-unit-tests]
    if: needs.detect-changes.outputs.packages != '[]' && needs.run-unit-tests.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.packages) }}
    uses: Chisanan232/GitHub-Action_Reusable_Workflows-Python/.github/workflows/rw_organize_test_cov_reports.yaml@master
    with:
      project_name: ${{ matrix.package == 'core' && 'test-coverage-mcp' || 'test-coverage-mcp-codecov' }}
      working_directory: ${{ matrix.package == 'core' && './test-coverage-mcp' || './test-coverage-mcp-codecov' }}
      test_type: unit-test

  organize-integration-coverage:
    name: Organize Integration Coverage - ${{ matrix.package }}
    needs: [detect-changes, run-integration-tests]
    if: needs.detect-changes.outputs.packages != '[]' && needs.run-integration-tests.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.packages) }}
    uses: Chisanan232/GitHub-Action_Reusable_Workflows-Python/.github/workflows/rw_organize_test_cov_reports.yaml@master
    with:
      project_name: ${{ matrix.package == 'core' && 'test-coverage-mcp' || 'test-coverage-mcp-codecov' }}
      working_directory: ${{ matrix.package == 'core' && './test-coverage-mcp' || './test-coverage-mcp-codecov' }}
      test_type: integration-test

  organize-contract-coverage:
    name: Organize Contract Coverage - ${{ matrix.package }}
    needs: [detect-changes, run-contract-tests]
    if: needs.detect-changes.outputs.packages != '[]' && needs.run-contract-tests.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.packages) }}
    uses: Chisanan232/GitHub-Action_Reusable_Workflows-Python/.github/workflows/rw_organize_test_cov_reports.yaml@master
    with:
      project_name: ${{ matrix.package == 'core' && 'test-coverage-mcp' || 'test-coverage-mcp-codecov' }}
      working_directory: ${{ matrix.package == 'core' && './test-coverage-mcp' || './test-coverage-mcp-codecov' }}
      test_type: contract-test

  organize-all-coverage:
    name: Organize All Coverage - ${{ matrix.package }}
    needs: [detect-changes, organize-unit-coverage, organize-integration-coverage, organize-contract-coverage]
    if: |
      needs.detect-changes.outputs.packages != '[]' &&
      (needs.organize-unit-coverage.result == 'success' || needs.organize-unit-coverage.result == 'skipped') &&
      (needs.organize-integration-coverage.result == 'success' || needs.organize-integration-coverage.result == 'skipped') &&
      (needs.organize-contract-coverage.result == 'success' || needs.organize-contract-coverage.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.packages) }}
    uses: Chisanan232/GitHub-Action_Reusable_Workflows-Python/.github/workflows/rw_organize_test_cov_reports.yaml@master
    with:
      project_name: ${{ matrix.package == 'core' && 'test-coverage-mcp' || 'test-coverage-mcp-codecov' }}
      working_directory: ${{ matrix.package == 'core' && './test-coverage-mcp' || './test-coverage-mcp-codecov' }}
      test_type: all

  # ── Upload coverage reports ──

  upload-unit-coverage:
    name: Upload Unit Coverage - ${{ matrix.package }}
    needs: [detect-changes, organize-unit-coverage]
    if: needs.detect-changes.outputs.packages != '[]' && needs.organize-unit-coverage.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.packages) }}
    uses: Chisanan232/GitHub-Action_Reusable_Workflows-Python/.github/workflows/rw_upload_test_cov_report.yaml@master
    with:
      project_name: ${{ matrix.package == 'core' && 'test-coverage-mcp' || 'test-coverage-mcp-codecov' }}
      working_directory: ${{ matrix.package == 'core' && './test-coverage-mcp' || './test-coverage-mcp-codecov' }}
      test_type: unit-test
      codecov_name: ${{ matrix.package == 'core' && 'test-coverage-mcp' || 'test-coverage-mcp-codecov' }}
      codecov_flags: ${{ matrix.package == 'core' && 'core' || 'codecov' }},unit-test
    secrets:
      codecov_token: ${{ secrets.CODECOV_TOKEN }}

  upload-integration-coverage:
    name: Upload Integration Coverage - ${{ matrix.package }}
    needs: [detect-changes, organize-integration-coverage]
    if: needs.detect-changes.outputs.packages != '[]' && needs.organize-integration-coverage.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.packages) }}
    uses: Chisanan232/GitHub-Action_Reusable_Workflows-Python/.github/workflows/rw_upload_test_cov_report.yaml@master
    with:
      project_name: ${{ matrix.package == 'core' && 'test-coverage-mcp' || 'test-coverage-mcp-codecov' }}
      working_directory: ${{ matrix.package == 'core' && './test-coverage-mcp' || './test-coverage-mcp-codecov' }}
      test_type: integration-test
      codecov_name: ${{ matrix.package == 'core' && 'test-coverage-mcp' || 'test-coverage-mcp-codecov' }}
      codecov_flags: ${{ matrix.package == 'core' && 'core' || 'codecov' }},integration-test
    secrets:
      codecov_token: ${{ secrets.CODECOV_TOKEN }}

  upload-contract-coverage:
    name: Upload Contract Coverage - ${{ matrix.package }}
    needs: [detect-changes, organize-contract-coverage]
    if: needs.detect-changes.outputs.packages != '[]' && needs.organize-contract-coverage.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.packages) }}
    uses: Chisanan232/GitHub-Action_Reusable_Workflows-Python/.github/workflows/rw_upload_test_cov_report.yaml@master
    with:
      project_name: ${{ matrix.package == 'core' && 'test-coverage-mcp' || 'test-coverage-mcp-codecov' }}
      working_directory: ${{ matrix.package == 'core' && './test-coverage-mcp' || './test-coverage-mcp-codecov' }}
      test_type: contract-test
      codecov_name: ${{ matrix.package == 'core' && 'test-coverage-mcp' || 'test-coverage-mcp-codecov' }}
      codecov_flags: ${{ matrix.package == 'core' && 'core' || 'codecov' }},contract-test
    secrets:
      codecov_token: ${{ secrets.CODECOV_TOKEN }}

  upload-all-coverage:
    name: Upload All Coverage - ${{ matrix.package }}
    needs: [detect-changes, organize-all-coverage]
    if: needs.detect-changes.outputs.packages != '[]' && needs.organize-all-coverage.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.packages) }}
    uses: Chisanan232/GitHub-Action_Reusable_Workflows-Python/.github/workflows/rw_upload_test_cov_report.yaml@master
    with:
      project_name: ${{ matrix.package == 'core' && 'test-coverage-mcp' || 'test-coverage-mcp-codecov' }}
      working_directory: ${{ matrix.package == 'core' && './test-coverage-mcp' || './test-coverage-mcp-codecov' }}
      test_type: all
      codecov_name: ${{ matrix.package == 'core' && 'test-coverage-mcp' || 'test-coverage-mcp-codecov' }}
      codecov_flags: ${{ matrix.package == 'core' && 'core' || 'codecov' }},all
    secrets:
      codecov_token: ${{ secrets.CODECOV_TOKEN }}

  upload-sonarqube:
    name: Upload to SonarQube - ${{ matrix.package }}
    needs: [detect-changes, organize-all-coverage]
    if: needs.detect-changes.outputs.packages != '[]' && needs.organize-all-coverage.result == 'success' && github.ref_name == 'master'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.packages) }}
    uses: Chisanan232/GitHub-Action_Reusable_Workflows-Python/.github/workflows/rw_upload_test_cov_report.yaml@master
    with:
      project_name: ${{ matrix.package == 'core' && 'test-coverage-mcp' || 'test-coverage-mcp-codecov' }}
      working_directory: ${{ matrix.package == 'core' && './test-coverage-mcp' || './test-coverage-mcp-codecov' }}
      test_type: all
      sonarqube_enable: true
      sonarqube_name: ${{ matrix.package == 'core' && 'test-coverage-mcp' || 'test-coverage-mcp-codecov' }}
    secrets:
      sonar_token: ${{ secrets.SONAR_TOKEN }}

  # Summary job
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - run-unit-tests
      - run-integration-tests
      - run-contract-tests
      - organize-unit-coverage
      - organize-integration-coverage
      - organize-contract-coverage
      - organize-all-coverage
      - upload-unit-coverage
      - upload-integration-coverage
      - upload-contract-coverage
      - upload-all-coverage
      - upload-sonarqube
    if: always()
    steps:
      - name: Check CI Status
        run: |
          echo "=== Monorepo CI Summary ==="
          echo ""
          echo "Changed Packages:              ${{ needs.detect-changes.outputs.packages }}"
          echo "Core Changed:                  ${{ needs.detect-changes.outputs.core }}"
          echo "Codecov Changed:               ${{ needs.detect-changes.outputs.codecov }}"
          echo ""
          echo "Unit Tests:                    ${{ needs.run-unit-tests.result }}"
          echo "Integration Tests:             ${{ needs.run-integration-tests.result }}"
          echo "Contract Tests:                ${{ needs.run-contract-tests.result }}"
          echo ""
          echo "Organize Unit Coverage:        ${{ needs.organize-unit-coverage.result }}"
          echo "Organize Integration Coverage: ${{ needs.organize-integration-coverage.result }}"
          echo "Organize Contract Coverage:    ${{ needs.organize-contract-coverage.result }}"
          echo "Organize All Coverage:         ${{ needs.organize-all-coverage.result }}"
          echo ""
          echo "Unit Coverage Upload:          ${{ needs.upload-unit-coverage.result }}"
          echo "Integration Coverage Upload:   ${{ needs.upload-integration-coverage.result }}"
          echo "Contract Coverage Upload:      ${{ needs.upload-contract-coverage.result }}"
          echo "All Coverage Upload:           ${{ needs.upload-all-coverage.result }}"
          echo "SonarQube Upload:              ${{ needs.upload-sonarqube.result }}"
          echo ""

          if ([ "${{ needs.run-unit-tests.result }}" == "success" ] || [ "${{ needs.run-unit-tests.result }}" == "skipped" ]) && \
             ([ "${{ needs.run-integration-tests.result }}" == "success" ] || [ "${{ needs.run-integration-tests.result }}" == "skipped" ]) && \
             ([ "${{ needs.run-contract-tests.result }}" == "success" ] || [ "${{ needs.run-contract-tests.result }}" == "skipped" ]) && \
             ([ "${{ needs.organize-unit-coverage.result }}" == "success" ] || [ "${{ needs.organize-unit-coverage.result }}" == "skipped" ]) && \
             ([ "${{ needs.organize-integration-coverage.result }}" == "success" ] || [ "${{ needs.organize-integration-coverage.result }}" == "skipped" ]) && \
             ([ "${{ needs.organize-contract-coverage.result }}" == "success" ] || [ "${{ needs.organize-contract-coverage.result }}" == "skipped" ]) && \
             ([ "${{ needs.organize-all-coverage.result }}" == "success" ] || [ "${{ needs.organize-all-coverage.result }}" == "skipped" ]) && \
             ([ "${{ needs.upload-unit-coverage.result }}" == "success" ] || [ "${{ needs.upload-unit-coverage.result }}" == "skipped" ]) && \
             ([ "${{ needs.upload-integration-coverage.result }}" == "success" ] || [ "${{ needs.upload-integration-coverage.result }}" == "skipped" ]) && \
             ([ "${{ needs.upload-contract-coverage.result }}" == "success" ] || [ "${{ needs.upload-contract-coverage.result }}" == "skipped" ]) && \
             ([ "${{ needs.upload-all-coverage.result }}" == "success" ] || [ "${{ needs.upload-all-coverage.result }}" == "skipped" ]) && \
             ([ "${{ needs.upload-sonarqube.result }}" == "success" ] || [ "${{ needs.upload-sonarqube.result }}" == "skipped" ]); then
            echo "✅ CI passed successfully!"
          else
            echo "❌ CI failed. Check test results above."
            exit 1
          fi
