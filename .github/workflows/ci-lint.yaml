name: CI - Lint & Type Check

on:
  pull_request:
    branches:
      - master
      - develop
    paths:
      # Python files
      - "test-coverage-mcp/**/*.py"
      - "test-coverage-mcp-codecov/**/*.py"
      # Configuration files
      - "mypy.ini"
      - "ruff.toml"
      - ".pre-commit-config.yaml"
      - "pyproject.toml"

  # Manual trigger
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Ruff Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install UV
        uses: astral-sh/setup-uv@v2

      - name: Run Ruff Linter
        run: uv run ruff check .

      - name: Run Ruff Formatter Check
        run: uv run ruff format --check .

  type-check:
    name: MyPy Type Checking
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install UV
        uses: astral-sh/setup-uv@v2

      - name: Type Check Core Package
        run: uv run mypy test-coverage-mcp/src

      - name: Type Check Codecov Provider
        run: uv run mypy test-coverage-mcp-codecov/src

  pre-commit:
    name: Pre-Commit Hooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install UV
        uses: astral-sh/setup-uv@v2

      - name: Run Pre-Commit Hooks
        run: uv run pre-commit run --all-files

  lint-summary:
    name: Lint Summary
    runs-on: ubuntu-latest
    needs: [lint, type-check, pre-commit]
    if: always()
    steps:
      - name: Check Lint Status
        run: |
          echo "=== Lint & Type Check Summary ==="
          echo ""
          echo "Ruff Lint:              ${{ needs.lint.result }}"
          echo "MyPy Type Check:        ${{ needs.type-check.result }}"
          echo "Pre-Commit Hooks:       ${{ needs.pre-commit.result }}"
          echo ""

          if ([ "${{ needs.lint.result }}" == "success" ] || [ "${{ needs.lint.result }}" == "skipped" ]) && \
             ([ "${{ needs.type-check.result }}" == "success" ] || [ "${{ needs.type-check.result }}" == "skipped" ]) && \
             ([ "${{ needs.pre-commit.result }}" == "success" ] || [ "${{ needs.pre-commit.result }}" == "skipped" ]); then
            echo "✅ All lint checks passed!"
          else
            echo "❌ Lint checks failed. Please fix the issues above."
            exit 1
          fi
