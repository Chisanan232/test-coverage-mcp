###################################################################################################################################
#
# Workflow Description:
#     Unified reusable workflow for running tests and handling coverage reports in a monorepo.
#     Combines: test execution → coverage organization → coverage upload into a single workflow.
#     This ensures that if a package has no tests, the entire process is skipped cleanly.
#
# Workflow input parameters:
#     * package: Package identifier ('core' or 'codecov')
#     * project_name: Full project name (e.g., 'test-coverage-mcp' or 'test-coverage-mcp-codecov')
#     * test_working_directory: Working directory for test execution (e.g., './test-coverage-mcp')
#     * test_type: Type of test ('unit-test', 'integration-test', 'contract-test')
#     * test_folder: Folder containing tests (e.g., './test/unit_test')
#     * python_versions: JSON array of Python versions to test
#     * operating_systems: JSON array of operating systems to test
#
# Workflow secrets:
#     * codecov_token: Token for uploading to Codecov
#     * sonar_token: Token for uploading to SonarQube
#
###################################################################################################################################

name: Test and Coverage - Unified Workflow

on:
  workflow_call:
    inputs:
      package:
        description: "Package identifier (core or codecov)"
        type: string
        required: true
      project_name:
        description: "Full project name for coverage reports"
        type: string
        required: true
      test_working_directory:
        description: "Working directory for test execution"
        type: string
        required: true
      test_type:
        description: "Type of test (unit-test, integration-test, contract-test)"
        type: string
        required: true
      test_folder:
        description: "Folder containing tests"
        type: string
        required: true
      python_versions:
        description: "JSON array of Python versions"
        type: string
        required: true
      operating_systems:
        description: "JSON array of operating systems"
        type: string
        required: true
    secrets:
      codecov_token:
        description: "Codecov token for uploading coverage"
        required: false
      sonar_token:
        description: "SonarQube token for uploading coverage"
        required: false

jobs:
  run-tests:
    name: Run ${{ inputs.test_type }} - ${{ inputs.package }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(inputs.python_versions) }}
        os: ${{ fromJson(inputs.operating_systems) }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install UV
        uses: astral-sh/setup-uv@v2

      - name: Run ${{ inputs.test_type }} tests
        working-directory: ${{ inputs.test_working_directory }}
        run: |
          uv sync
          uv run pytest ${{ inputs.test_folder }} --cov-config=../.coveragerc

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage_${{ inputs.project_name }}_${{ inputs.test_type }}_${{ matrix.os }}_${{ matrix.python-version }}
          path: ${{ inputs.test_working_directory }}/.coverage*
          if-no-files-found: ignore

  organize-coverage:
    name: Organize ${{ inputs.test_type }} Coverage - ${{ inputs.package }}
    needs: run-tests
    if: always() && needs.run-tests.result != 'skipped'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: coverage_${{ inputs.project_name }}_${{ inputs.test_type }}_*
          path: ${{ inputs.test_working_directory }}
          merge-multiple: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install coverage tools
        run: |
          python3 -m pip install --upgrade pip
          pip3 install coverage

      - name: Combine coverage reports
        working-directory: ${{ inputs.test_working_directory }}
        run: |
          mkdir -p ./scripts/ci/
          echo "Download shell script for combining coverage reports ..."
          curl https://raw.githubusercontent.com/Chisanan232/GitHub-Action_Reusable_Workflows-Python/develop/scripts/ci/combine_coverage_reports.sh --output ./scripts/ci/combine_coverage_reports.sh
          bash ./scripts/ci/combine_coverage_reports.sh ${{ inputs.test_type }} .coverage.

      - name: Upload combined coverage report
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.project_name }}_${{ inputs.test_type }}_coverage_data_file
          path: ${{ inputs.test_working_directory }}.coverage
          if-no-files-found: error
          include-hidden-files: true

      - name: Upload coverage XML report
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.project_name }}_${{ inputs.test_type }}_coverage_xml_report
          path: ${{ inputs.test_working_directory }}coverage**xml
          if-no-files-found: error
          include-hidden-files: true

  upload-coverage:
    name: Upload ${{ inputs.test_type }} Coverage - ${{ inputs.package }}
    needs: organize-coverage
    if: always() && needs.organize-coverage.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download coverage reports
        uses: actions/download-artifact@v8
        with:
          pattern: ${{ inputs.project_name }}_${{ inputs.test_type }}_coverage_*
          path: ${{ inputs.test_working_directory }}
          merge-multiple: true

      - name: Upload to Codecov
        if: secrets.codecov_token != ''
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.codecov_token }}
          files: ${{ inputs.test_working_directory }}/coverage.xml
          flags: ${{ inputs.package }},${{ inputs.test_type }}
          name: ${{ inputs.project_name }}
          fail_ci_if_error: false

      - name: Upload to SonarQube
        if: secrets.sonar_token != '' && github.ref_name == 'master' && inputs.test_type == 'unit-test'
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.sonar_token }}
        with:
          args: >
            -Dsonar.projectKey=${{ inputs.project_name }}
            -Dsonar.sources=${{ inputs.test_working_directory }}/src
            -Dsonar.coverage.exclusions=${{ inputs.test_working_directory }}/test/**
            -Dsonar.coverageReportPaths=${{ inputs.test_working_directory }}/coverage.xml
