# UV Workspace configuration for monorepo
[tool.uv.workspace]
members = ["test-coverage-mcp", "test-coverage-mcp-codecov"]

[dependency-groups]
dev = [
    "pytest>=8.4.2",
    "pytest-cov>=5.0.0,<8",
    "pytest-asyncio>=1.1.0",
    "coverage>=7.10.6",
    "pytest-rerunfailures>=16.0.1",
    "aiohttp>=3.12.15",
]
pre-commit-ci = [
    "mypy>=1.20.1",
    "pre-commit>=4.3.0",
    "ruff>=0.14.14",
]

[tool.uv]
default-groups = [
    "dev",
    "pre-commit-ci",
]
