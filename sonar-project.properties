sonar.host.url=https://sonarcloud.io
sonar.projectKey=Chisanan232_test-coverage-mcp
sonar.organization=chisanan232
sonar.issues.defaultAssigneeLogin=Bryant

sonar.projectName=test-coverage-mcp
sonar.projectVersion=0.0.0
sonar.projectBaseDir=./

# Multi-module monorepo configuration
sonar.modules=core,codecov

# Core package module
core.sonar.projectBaseDir=test-coverage-mcp
core.sonar.projectName=test-coverage-mcp (Core)
core.sonar.sources=src
core.sonar.tests=test
core.sonar.python.coverage.reportPaths=coverage*.xml

# Codecov provider module
codecov.sonar.projectBaseDir=test-coverage-mcp-codecov
codecov.sonar.projectName=test-coverage-mcp-codecov (CodeCov adapter)
codecov.sonar.sources=src
codecov.sonar.tests=test
codecov.sonar.python.coverage.reportPaths=coverage*.xml

# Global Python settings
sonar.python.file.suffixes=.py
sonar.python.version=3.12,3.13,3.14
sonar.sourceEncoding=UTF-8

# Workspace-wide exclusions (if any)
# sonar.coverage.exclusions=
# sonar.exclusions=**/migrations/**
# sonar.test.exclusions=tests/helpers/**
