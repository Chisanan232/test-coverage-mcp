# test-coverage-mcp Configuration Example

# Server configuration
server:
  # Transport type: sse or http
  transport: sse
  
  # Host to bind to
  host: 0.0.0.0
  
  # Port to bind to
  port: 8000
  
  # Logging level: debug, info, warning, error
  log_level: info
  
  # Enable integrated mode (combined web server and MCP)
  integrated: true
  
  # Enable auto-reload on code changes (development only)
  reload: false

# Provider configuration
providers:
  codecov:
    # Codecov API token
    token: ${CODECOV_TOKEN}
    
    # Optional: Custom API endpoint
    # endpoint: https://api.codecov.io
    
    # Optional: Request timeout in seconds
    # timeout: 30
  
  coveralls:
    # Coveralls API token
    token: ${COVERALLS_TOKEN}
    
    # Optional: Custom API endpoint
    # endpoint: https://coveralls.io/api

# Feature flags
features:
  # Enable all features
  all: true
  
  # Individual feature control
  provider_discovery: true
  health_checks: true
  coverage_comparison: true
  pr_analysis: true
  advanced_analysis: true

# Caching configuration (optional)
cache:
  # Enable caching
  enabled: true
  
  # Cache TTL in seconds
  ttl: 3600
  
  # Cache backend: memory, redis
  backend: memory

# Monitoring configuration (optional)
monitoring:
  # Enable metrics collection
  enabled: true
  
  # Metrics endpoint
  endpoint: /metrics
  
  # Include detailed metrics
  detailed: false

# Security configuration
security:
  # Enable CORS
  cors_enabled: true
  
  # CORS allowed origins
  cors_origins:
    - "*"
  
  # Enable rate limiting
  rate_limiting_enabled: false
  
  # Rate limit requests per minute
  rate_limit_rpm: 60
